name: mamgo
description: "MămGo - Ứng dụng nhắc nhở và gợi ý món ăn"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  google_generative_ai: ^0.4.7
  cached_network_image: ^3.4.1
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - logo.png
    - chatbot.png
